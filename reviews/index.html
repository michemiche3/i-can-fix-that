  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f0f0f;
      --border: #242424;
      --muted:  #505050;
      --dim:    #888;
      --text:   #ccc;
      --bright: #efefea;
      --accent: #c8f55a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.75;
      max-width: 640px;
      margin: 0 auto;
      padding: 5rem 2rem 6rem;
    }

    header { margin-bottom: 5rem; }

    .site-name {
      font-family: 'Instrument Serif', serif;
      font-size: 1.6rem;
      color: var(--bright);
      margin-bottom: 0.4rem;
    }

    .site-name span { color: var(--accent); }

    .site-tagline {
      font-size: 13px;
      color: var(--muted);
    }

    .trustpilot-reviews {
  width: 100%;
  padding: 1rem 0;
  background: #0f0f0f;
  text-align: center;

  .trust-icons {
    margin: 0;
  }

  .stars {
    display: inline-block;
    list-style: none;
    margin-top: 0 !important;
    padding-left: 0 !important;
    margin-bottom: 0;

    li {
      display: inline-block;
      margin-right: 0.25em !important;
      width: 28px;
      height: 28px;
      background: #00b67a;
      text-align: center;

      path {
        transform: scale(0.32);
      }
    }
  }

  .score {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    font-size: 0.9em;
    color: #6b6b6b;

    span {
      width: 100%;
      text-align: center;
      font-size: 2em;
      font-weight: bold;
      color: #000;
    }
  }

  @media (min-width: 480px) {
    .score {
      .stars {
        width: auto !important;
      }
      span {
        margin-right: 0.5em;
        display: inline-block;
      }
    }
  }
}

    section { margin-bottom: 4rem; }

    h2 {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    p {
      color: var(--dim);
      font-size: 13px;
      line-height: 1.85;
      margin-bottom: 0.75rem;
    }

    p:last-child { margin-bottom: 0; }

    .service-list { list-style: none; }

    .service-list li {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
    }

    .service-list li:first-child { border-top: 1px solid var(--border); }

    .price-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1rem;
      font-style: italic;
    }

    .contact-line {
      display: flex;
      gap: 0.6rem;
      font-size: 13px;
      color: var(--dim);
      margin-bottom: 0.4rem;
    }

    .contact-line .label {
      color: var(--muted);
      min-width: 80px;
    }

    .contact-line a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.15s, border-color 0.15s;
    }

    .contact-line a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    footer {
      margin-top: 5rem;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header                 { animation: fadeUp 0.5s ease both; }
    section:nth-of-type(1) { animation: fadeUp 0.5s 0.05s ease both; }
    section:nth-of-type(2) { animation: fadeUp 0.5s 0.10s ease both; }
    section:nth-of-type(3) { animation: fadeUp 0.5s 0.15s ease both; }
  </style>
</head>
